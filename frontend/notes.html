<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BELAL AI Notes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 30px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, button {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }

    input {
      width: 70%;
    }

    button {
      cursor: pointer;
    }

    li {
      margin-top: 8px;
    }

    a {
      margin-right: 12px;
      text-decoration: none;
      color: #0b57d0;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Notes 📝</h1>

  <p>
    <a href="index.html">Chat</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="tasks.html">Tasks</a>
    <a href="login.html">Login</a>
  </p>

  <div class="box">
    <input id="noteInput" type="text" placeholder="Write a note">
    <button id="addNoteBtn">Add Note</button>
    <ul id="notesList"></ul>
  </div>

  <script>
    function loadNotes() {
      const notes = JSON.parse(localStorage.getItem("belal_notes") || "[]");
      const list = document.getElementById("notesList");
      list.innerHTML = "";

      notes.forEach((note, index) => {
        const li = document.createElement("li");
        li.innerHTML = `${note} <button onclick="deleteNote(${index})">Delete</button>`;
        list.appendChild(li);
      });
    }

    function deleteNote(index) {
      const notes = JSON.parse(localStorage.getItem("belal_notes") || "[]");
      notes.splice(index, 1);
      localStorage.setItem("belal_notes", JSON.stringify(notes));
      loadNotes();
    }

    document.getElementById("addNoteBtn").addEventListener("click", function () {
      const input = document.getElementById("noteInput");
      const value = input.value.trim();

      if (!value) return;

      const notes = JSON.parse(localStorage.getItem("belal_notes") || "[]");
      notes.push(value);
      localStorage.setItem("belal_notes", JSON.stringify(notes));
      input.value = "";
      loadNotes();
    });

    loadNotes();
  </script>

</body>
</html>
