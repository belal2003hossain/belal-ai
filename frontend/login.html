<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BELAL AI Login</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f7fb;
      color: #222;
    }

    .container {
      max-width: 760px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 16px;
    }

    .nav {
      display: flex;
      gap: 18px;
      margin-bottom: 24px;
      font-weight: 700;
      flex-wrap: wrap;
    }

    .nav a {
      text-decoration: none;
      color: #2b5fd9;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 14px;
      border: 1px solid #d0d7e2;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      color: white;
      margin-bottom: 12px;
    }

    .register-btn {
      background: #17c38f;
    }

    .login-btn {
      background: #2f7df6;
    }

    .msg {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 700;
      min-height: 28px;
    }

    .success {
      color: #0a8f4d;
    }

    .error {
      color: #d93025;
    }

    .info {
      color: #2b5fd9;
    }

    .hint {
      font-size: 14px;
      color: #555;
      margin-top: 8px;
      line-height: 1.5;
    }

    .small {
      font-size: 13px;
      color: #666;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Login / Register 🔐</h1>

    <div class="nav">
      <a href="/">Chat</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/notes">Notes</a>
      <a href="/tasks">Tasks</a>
    </div>

    <div class="card">
      <input id="username" type="text" placeholder="Username" />
      <input id="password" type="password" placeholder="Password" />

      <button class="register-btn" id="registerBtn">Register</button>
      <button class="login-btn" id="loginBtn">Login</button>

      <div id="msg" class="msg info">Ready</div>

      <div class="hint">
        নতুন username দিয়ে try করো। Example: <b>belal2</b>
      </div>

      <div class="small">
        Password minimum 4 character দিলেই চলবে।
      </div>
    </div>
  </div>

  <script>
    const msgEl = document.getElementById("msg");
    const registerBtn = document.getElementById("registerBtn");
    const loginBtn = document.getElementById("loginBtn");

    function setMessage(text, type = "info") {
      msgEl.textContent = text;
      msgEl.className = `msg ${type}`;
    }

    function getFormData() {
      const username = document.getElementById("username").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      return { username, password };
    }

    function setLoading(isLoading, actionText) {
      registerBtn.disabled = isLoading;
      loginBtn.disabled = isLoading;

      if (isLoading) {
        setMessage(actionText, "info");
      }
    }

    async function registerUser() {
      const { username, password } = getFormData();

      if (!username || !password) {
        setMessage("Username ar password dao ❌", "error");
        return;
      }

      if (password.length < 4) {
        setMessage("Password ektu boro dao ❌", "error");
        return;
      }

      setLoading(true, "Register hocche...");

      try {
        const res = await fetch("/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          setMessage(data.message || "Register success ✅", "success");
        } else {
          setMessage(data.message || "Register e problem hoise ❌", "error");
        }
      } catch (error) {
        console.error("Register error:", error);
        setMessage("Server er sathe connect hocche na ❌", "error");
      } finally {
        setLoading(false, "Ready");
      }
    }

    async function loginUser() {
      const { username, password } = getFormData();

      if (!username || !password) {
        setMessage("Username ar password dao ❌", "error");
        return;
      }

      setLoading(true, "Login hocche...");

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem("belal_username", data.username || username);
          setMessage(data.message || "Login success ✅", "success");

          setTimeout(() => {
            window.location.href = "/";
          }, 700);
        } else {
          setMessage(data.message || "Login e problem hoise ❌", "error");
        }
      } catch (error) {
        console.error("Login error:", error);
        setMessage("Server er sathe connect hocche na ❌", "error");
      } finally {
        setLoading(false, "Ready");
      }
    }

    registerBtn.addEventListener("click", registerUser);
    loginBtn.addEventListener("click", loginUser);

    document.getElementById("password").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        loginUser();
      }
    });
  </script>
</body>
</html>
