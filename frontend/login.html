<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BELAL AI Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    button {
      cursor: pointer;
    }

    .login-btn {
      background: #0b57d0;
      color: white;
      border: none;
    }

    .register-btn {
      background: #10b981;
      color: white;
      border: none;
    }

    a {
      margin-right: 12px;
      text-decoration: none;
      color: #0b57d0;
      font-weight: bold;
    }

    #msg {
      margin-top: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Login / Register 🔐</h1>

  <p>
    <a href="index.html">Chat</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="notes.html">Notes</a>
    <a href="tasks.html">Tasks</a>
  </p>

  <div class="box">
    <input id="username" type="text" placeholder="Enter username">
    <input id="password" type="password" placeholder="Enter password">

    <button class="register-btn" id="registerBtn">Register</button>
    <button class="login-btn" id="loginBtn">Login</button>

    <p id="msg"></p>
  </div>

  <script>
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const registerBtn = document.getElementById("registerBtn");
    const loginBtn = document.getElementById("loginBtn");
    const msg = document.getElementById("msg");

    registerBtn.addEventListener("click", async function () {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      if (!username || !password) {
        msg.innerText = "Username ar password dao ❌";
        return;
      }

      try {
        const response = await fetch("http://localhost:5000/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        msg.innerText = data.message;
      } catch (error) {
        msg.innerText = "Register e problem hoise ❌";
      }
    });

    loginBtn.addEventListener("click", async function () {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      if (!username || !password) {
        msg.innerText = "Username ar password dao ❌";
        return;
      }

      try {
        const response = await fetch("http://localhost:5000/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem("belal_logged_user", data.username);
          msg.innerText = data.message;

          setTimeout(() => {
            window.location.href = "index.html";
          }, 700);
        } else {
          msg.innerText = data.message;
        }
      } catch (error) {
        msg.innerText = "Login e problem hoise ❌";
      }
    });
  </script>

</body>
</html>
